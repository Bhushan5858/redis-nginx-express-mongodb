events {}

http {
  proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=my_cache:10m;

  server {
    listen 80;

    location /products {
      proxy_cache my_cache;
      proxy_cache_valid 200 60s;
      add_header X-Cache-Status $upstream_cache_status;

      proxy_pass http://host.docker.internal:5000;
    }

    location / {
      proxy_pass http://host.docker.internal:5000;
    }
  }
}